name: Build PDFTools

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: PDFTools-linux
          - os: macos-latest
            artifact: PDFTools-macos
          - os: windows-latest
            artifact: PDFTools-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            tesseract-ocr tesseract-ocr-all poppler-utils \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install tesseract tesseract-lang poppler

      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        run: choco install tesseract --yes

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install .
          pip install pyinstaller

      - name: Rebuild PyInstaller bootloader
        shell: bash
        run: |
          PYI_VERSION=$(python -c "import PyInstaller; print(PyInstaller.__version__)")
          git clone --depth 1 --branch "v${PYI_VERSION}" https://github.com/pyinstaller/pyinstaller.git _pyi
          cd _pyi/bootloader
          if [ "$RUNNER_OS" == "Windows" ]; then
            export PATH="/c/msys64/mingw64/bin:$PATH"
          fi
          python ./waf distclean all
          cd ..
          pip install . --force-reinstall

      - name: Collect tessdata (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p tessdata
          TESSDATA=$(dirname "$(find /usr /opt/homebrew /usr/local -name 'eng.traineddata' -print -quit 2>/dev/null)")
          for lang in eng kor tha fra osd; do
            [ -f "$TESSDATA/${lang}.traineddata" ] && cp "$TESSDATA/${lang}.traineddata" tessdata/
          done
          echo "TESSERACT_BIN=$(which tesseract)" >> $GITHUB_ENV

      - name: Collect tessdata (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p tessdata
          TESSDATA="C:/Program Files/Tesseract-OCR/tessdata"
          for lang in eng kor tha fra osd; do
            [ -f "$TESSDATA/${lang}.traineddata" ] && cp "$TESSDATA/${lang}.traineddata" tessdata/
          done
          echo "TESSERACT_BIN=C:/Program Files/Tesseract-OCR/tesseract.exe" >> $GITHUB_ENV

      - name: Build executable
        run: python build_app.py

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
